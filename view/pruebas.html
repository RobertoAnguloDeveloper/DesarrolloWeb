

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .contenedor{
            border: 2px solid black;
            width: 40%;
            height: 80%;
            box-sizing: border-box;
            background-color: rgba(182, 182, 182, 0.258);
            position: absolute;
            border-radius: 10px;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }

        #btn-x{
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 255, 13, 0.701);
            color: rgb(0, 0, 0);
            font-size: 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .cuadro{
            padding: 20px;
            width: 60%;
            height: 80%;
            background-color: rgba(255, 238, 0, 0.551);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 10px;
        }
    </style>

    <script>
        //Make a lightbox moveable
        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (document.getElementById(elmnt.id + "header")) {
                /* if present, the header is where you move the DIV from:*/
                document.getElementById(elmnt.id + "header").onmousedown = dragMouseDown;
            } else {
                /* otherwise, move the DIV from anywhere inside the DIV:*/
                elmnt.onmousedown = dragMouseDown;
            }
            
            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                // get the mouse cursor position at startup:
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                // call a function whenever the cursor moves:
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                // calculate the new cursor position:
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                // set the element's new position:
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                /* stop moving when mouse button is released:*/
                document.onmouseup = null;
                document.onmousemove = null;
            }

        }

        window.onload = function() {
            var fadeTarget = document.getElementById("log-in");
            dragElement(fadeTarget);
            var fadeEffect = setInterval(function() {
                if (!fadeTarget.style.opacity) {
                    fadeTarget.style.opacity = 0;
                }
                if (fadeTarget.style.opacity < 1) {
                    fadeTarget.style.opacity = parseFloat(fadeTarget.style.opacity) + 0.1;
                } else {
                    clearInterval(fadeEffect);
                }
            }, 100);
        }

        function fadeOutEffect() {
            var fadeTarget = document.getElementById("log-in");
    
            var fadeEffect = setInterval(function() {
                if (!fadeTarget.style.opacity) {
                    fadeTarget.style.opacity = 1;
                }
                if (fadeTarget.style.opacity > 0) {
                    fadeTarget.style.opacity -= 0.1;
                } else {
                    clearInterval(fadeEffect);
                }
            }, 30);
        }

        function fadeInEffect() {
            var fadeTarget = document.getElementById("log-in");
            var fadeEffect = setInterval(function() {
                if (!fadeTarget.style.opacity) {
                    fadeTarget.style.opacity = 0;
                }
                if (fadeTarget.style.opacity < 1) {
                    fadeTarget.style.opacity = parseFloat(fadeTarget.style.opacity) + 0.1;
                } else {
                    clearInterval(fadeEffect);
                }
            }, 100);
        }
    </script>

    <div class="contenedor" id="log-in">
        <button id="btn-x" onclick="fadeOutEffect();">x</button>
        <div class="cuadro">
            <form method="POST">
                <h1>Iniciar Sesión</h1>
                <input type="text" name="user" placeholder="Usuario">
                <input type="password" name="password" placeholder="Contraseña">
                <input type="submit" value="Iniciar Sesión">
            </form>
        </div>
    </div>
</body>
</html>
